<!doctype html>
<html>
    <style>
        body {
            background-color: rgb(44, 46, 47);
            color: antiquewhite;
        }
        .page-header-title {
            /*float: left;*/
        }
        .bird_main_body {
            display: block;
            width: 100%;
            overflow: hidden;
            clear: both;
        }
        .header-nav {
            display: block;
            width: 100%;
            overflow: hidden;
            clear: both;
        }
        .search-form {
            float: left;
        }
        .search-form button {
            margin-right: 5px;
            border-radius: 5px;
            border-style: none;
            height: 30px;
            font-size: 18px;
            font-weight: 600;
            color: black;
            background-color: antiquewhite;
        }
        .search-form input {
            margin-right: 5px;
            border-radius: 5px;
            border-style: none;
            height: 30px;
            font-size: 18px;
            font-weight: 600;
            color: black;
            background-color: antiquewhite;
        }
        /*.homepage-link {
            color: antiquewhite;
            background-color: rgb(60, 60, 60);
            font-size: 20px;
            margin-top: 5px;
            padding: 0px 10px 5px 10px;
            border-radius: 15px;
            float: right;
            display: block;
        }*/
        img {
            width: 33%;
            height: 33%;
            float: left;
            margin-right: 10px;
            margin-bottom: 5px;
        }
        p {
            margin-top: 10px;
            float: inline-start;
            width: 33%;
        }
        h2 {
            margin-top: 10px;
            margin-bottom: 0px;
            padding: 0;
        }
        hr {
            padding: 0px;
            margin: 28px 5px 28px 5px;
        }
    </style>
    <head>
        <title>{{.Title}}</title>
    </head>
    <body>
        <div class="header-nav">
            <h1
                class="page-header-title"
                onclick="window.location.href = '/'"
                style="cursor: pointer"
            >
                {{.Title}}
            </h1>
            <form class="search-form" action="/api/search">
                <input type="text" placeholder="Search" name="search-query" />
                <button>Submit</button>
            </form>
        </div>
        <hr />
        <div class="bird_main_body">
            <img src="bird_pictures/{{.Bird.PicturePath}}" />
            <h2>{{.Bird.Name}}</h2>
            <p>&emsp;{{.Bird.Description}}</p>
        </div>
    </body>
</html>
